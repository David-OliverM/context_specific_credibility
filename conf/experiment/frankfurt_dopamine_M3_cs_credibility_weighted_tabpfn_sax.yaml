# F1.4c diagnostic variant — Dopamine M=3 (drops `other`-bucket).
#
# Hand-curated from the auto-generated M=4 dopamine config; intentionally
# NOT regenerated by paper/scripts/generate_tabpfn_sax_configs.py (that
# generator only produces the M=4 canonical variant per the
# code/conf/grouping/dopamine_circuit_v2.csv source-of-truth).
#
# Purpose: test whether the 1792-SAX-feature `other` bucket is the primary
# overfit driver from F1.4b (Val/AUROC=0.98, Test/AUROC=0.43).
# See [[Decision Log - F1.5-F1.6 Sequence Inversion]] + F1.4c Pre-Doc.
#
# Differences vs M=4 dopamine config:
#   - modality_grouping: dopamine_M3 (drops `other` in the dataloader)
#   - modalities: 3 (was 4)
#   - encoders: no `other` block
#   - predictors: no `other` block
#   - head.sum_cond_fn_args.in_dim: 192 (= 3 * 64, was 256)

name: frankfurt/dopamine_M3_cs_credibility_weighted_tabpfn_sax
classification: true
multilabel: false
dataset:
  name: frankfurt
  path: ${data_dir}/neuro_data_UKF
  args:
    modality_grouping: dopamine_M3
    n_splits: 5
    fold: 0
    emit_timeseries: true
  modalities: 3
  batch_size: ${batch_size}
  num_classes: 3
  class_names:
  - Amisulpride
  - LDopa
  - Placebo
encoders:
  dorsal_striatum:
    type: TabPFNSAXEncoder
    args:
      roi_indices: [93, 94, 95, 96]
      embed_dim: 64
      sax_alphabet: 8
      sax_word_size: 16
      sax_strategy: quantile
      n_classes: 3
      tabpfn_device: cpu
      random_state: 42
  ventral_striatum:
    type: TabPFNSAXEncoder
    args:
      roi_indices: [103, 104]
      embed_dim: 64
      sax_alphabet: 8
      sax_word_size: 16
      sax_strategy: quantile
      n_classes: 3
      tabpfn_device: cpu
      random_state: 42
  da_projection_cortex:
    type: TabPFNSAXEncoder
    args:
      roi_indices: [4, 5, 6, 7, 48, 51, 52, 53, 54, 59, 60, 101, 102]
      embed_dim: 64
      sax_alphabet: 8
      sax_word_size: 16
      sax_strategy: quantile
      n_classes: 3
      tabpfn_device: cpu
      random_state: 42
predictors:
  dorsal_striatum:
    type: Classifier
    args:
      in_dim: 64
      out_dim: ${experiment.dataset.num_classes}
      n_layers: 1
      n_hidden: 64
  ventral_striatum:
    type: Classifier
    args:
      in_dim: 64
      out_dim: ${experiment.dataset.num_classes}
      n_layers: 1
      n_hidden: 64
  da_projection_cortex:
    type: Classifier
    args:
      in_dim: 64
      out_dim: ${experiment.dataset.num_classes}
      n_layers: 1
      n_hidden: 64
head:
  type: CredibilityWeightedMean
  threshold_input: false
  args:
    num_features: ${experiment.dataset.modalities}
    num_channels: 1
    depth: 1
    num_sums: 20
    num_leaves: 20
    num_repetitions: 20
    num_classes: ${experiment.dataset.num_classes}
    leaf_type: Dirichlet
    leaf_kwargs:
      num_classes: ${experiment.dataset.num_classes}
    einet_mixture: false
    layer_type: einsum
    dropout: 0.3
    conditional_sum: true
    sum_cond_fn_type: Classifier
    sum_cond_fn_args:
      in_dim: 192
      n_layers: 3
      n_hidden: 64
      final_activation: None
      out_dim: None
