  other:
    type: Classifier
    args:
      in_dim: 64
      out_dim: ${experiment.dataset.num_classes}
      n_layers: 1
      n_hidden: 64
head:
  type: CredibilityWeightedMean
  threshold_input: false
  args:
    num_features: ${experiment.dataset.modalities}
    num_channels: 1
    depth: 1
    num_sums: 20
    num_leaves: 20
    num_repetitions: 20
    num_classes: ${experiment.dataset.num_classes}
    leaf_type: Dirichlet
    leaf_kwargs:
      num_classes: ${experiment.dataset.num_classes}
    einet_mixture: false
    layer_type: einsum
    dropout: 0.3
    conditional_sum: true
    sum_cond_fn_type: Classifier
    sum_cond_fn_args:
      in_dim: 256
      n_layers: 3
      n_hidden: 64
      final_activation: None
      out_dim: None
