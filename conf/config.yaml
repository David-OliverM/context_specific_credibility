
# Default set of configurations.
defaults:
  - experiment: avmnist_mlp
  - _self_

# Hydra config
hydra:
  run:
    # dir: "${results_dir}/${experiment.name}/${now:%Y-%m-%d_%H-%M-%S}_${oc.select:tag}"
    dir: "${results_dir}/${oc.select:tag}"
  sweep:
    dir: "${hydra.run.dir}/${hydra.job.name}"
    subdir: "${hydra.run.dir}/${hydra.job.num}"
  job_logging:
    handlers:
      file:
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log  # Fixed in hydra-colorlog version 1.2.1

data_dir: "/path/to/datasets"
results_dir: "./results/${exp_setup}/${group_tag}"
project_name: "multimodal-fusion"
lr: 0.001
batch_size: 128
n_bits: 8
num_workers: 16
log_interval: 10
dry_run: False
seed: ???
device: "cuda"
debug: False
gpu: 0
epochs: 50
load_and_eval: False
resume_ckpt: null  # path to a Lightning .ckpt to resume training from; null = train from scratch
precision: 64
group_tag: ???
tag: ${experiment.name}/T${trial}/noise_${noise_severity}
wandb: False
trial: 1
swa: False
profiler: ???
torch_compile: False
dataset: ???
joint_training: True
lamda: 1
patience: 30
noise_severity: Null
test_noise: 0.0
temperature: [1,1]
weight_decay: 1e-4
freeze_unimodals: False
random_noise_context: False
exp_setup: "both_modalities_one_twice_as_severe"
con_loss: False
fully_decoupled_training: False
